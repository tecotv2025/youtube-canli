name: Playlist Güncelle

on:
  schedule:
    - cron: '*/15 * * * *'  # Her 15 dakikada bir otomatik çalışır
  workflow_dispatch:       # Elle başlatma butonu

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: yt-dlp Kur
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Playlist Oluştur
        run: python generate_playlist.py

      # Üçüncü parti paket yerine doğrudan standart Git komutları kullanıyoruz
      - name: Değişiklikleri Kaydet ve Gönder
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add playlist.m3u
          # Eğer değişiklik varsa commit et ve pushla, yoksa hata vermeden geç
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Playlist Update" && git push)
