name: Playlist Güncelle

on:
  schedule:
    - cron: '*/15 * * * *'  # Her 15 dakikada bir otomatik çalışır
  workflow_dispatch:       # İstediğimizde elle başlatabilmemiz için buton sağlar

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: yt-dlp Kur
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Playlist Oluştur
        run: python generate_playlist.py

      - name: Değişiklikleri Kaydet ve Gönder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Playlist Update"
          file_pattern: 'playlist.m3u'
